  <text x="124" y="23" fill="#8b949e" font-size="11">Compute</text>
  <rect x="200" y="14" width="10" height="10" rx="2" fill="#3a1a5c"/>
  <text x="214" y="23" fill="#8b949e" font-size="11">Storage / Messaging</text>
  <rect x="360" y="14" width="10" height="10" rx="2" fill="#3a2a10"/>
  <text x="374" y="23" fill="#8b949e" font-size="11">Security / IAM</text>

