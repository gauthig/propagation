  <line x1="20" y1="50"  x2="840" y2="50"  stroke="#30363d" stroke-width="0.5"/>
  <line x1="20" y1="166" x2="840" y2="166" stroke="#30363d" stroke-width="0.5"/>
  <line x1="20" y1="284" x2="840" y2="284" stroke="#30363d" stroke-width="0.5"/>
  <line x1="20" y1="420" x2="840" y2="420" stroke="#30363d" stroke-width="0.5"/>

  <!-- Row labels -->
  <text transform="translate(13,130) rotate(-90)" text-anchor="middle" fill="#8b949e" font-size="9">External</text>
  <text transform="translate(13,218) rotate(-90)" text-anchor="middle" fill="#8b949e" font-size="9">CDN</text>
  <text transform="translate(13,350) rotate(-90)" text-anchor="middle" fill="#8b949e" font-size="9">Compute</text>
  <text transform="translate(13,490) rotate(-90)" text-anchor="middle" fill="#8b949e" font-size="9">Data</text>

  <!-- Row 1: External -->
  <rect x="30" y="55" width="120" height="64" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="90" y="79" text-anchor="middle" fill="#e6edf3" font-weight="600">Browser</text>
  <text x="90" y="96" text-anchor="middle" fill="#8b949e" font-size="10">Ham radio operator</text>
  <text x="90" y="110" text-anchor="middle" fill="#8b949e" font-size="10">propagation.ggcloud.us</text>

  <rect x="200" y="55" width="130" height="64" rx="6" fill="#2d4a3a" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="265" y="79" text-anchor="middle" fill="#e6edf3" font-weight="600">Cloudflare DNS</text>
  <text x="265" y="96" text-anchor="middle" fill="#8b949e" font-size="10">CNAME → CloudFront</text>
  <text x="265" y="110" text-anchor="middle" fill="#f0883e" font-size="10">proxy OFF (grey cloud)</text>

  <rect x="385" y="55" width="140" height="64" rx="6" fill="#3a2a10" stroke="#bb8009" stroke-width="1.5"/>
  <text x="455" y="74" text-anchor="middle" fill="#e6edf3" font-weight="600">ACM Certificate</text>
  <text x="455" y="91" text-anchor="middle" fill="#8b949e" font-size="10">*.ggcloud.us wildcard</text>
  <text x="455" y="108" text-anchor="middle" fill="#bb8009" font-size="10">us-east-1 (required)</text>

  <rect x="580" y="55" width="240" height="64" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="700" y="75" text-anchor="middle" fill="#e6edf3" font-weight="600">External Solar APIs</text>
  <text x="700" y="92" text-anchor="middle" fill="#8b949e" font-size="10">hamqsl.com (primary)</text>
  <text x="700" y="107" text-anchor="middle" fill="#8b949e" font-size="10">NOAA SWPC (fallback)</text>

  <!-- Row 2: CloudFront -->
  <rect x="130" y="175" width="490" height="72" rx="6" fill="#1a2a3a" stroke="#1a5a8c" stroke-width="1.5"/>
  <text x="375" y="198" text-anchor="middle" fill="#e6edf3" font-weight="600">CloudFront Distribution</text>
  <text x="375" y="215" text-anchor="middle" fill="#8b949e" font-size="10">Cache policy: CachingDisabled  •  Origin request policy: AllViewerExceptHostHeader</text>
  <text x="375" y="232" text-anchor="middle" fill="#8b949e" font-size="10">Methods: GET HEAD OPTIONS PUT POST PATCH DELETE  •  HTTPS redirect  •  Price class 100</text>

  <!-- Row 3: Compute -->
  <rect x="130" y="300" width="210" height="64" rx="6" fill="#0d2137" stroke="#1a5a8c" stroke-width="1.5"/>
  <text x="235" y="322" text-anchor="middle" fill="#e6edf3" font-weight="600">Lambda Function URL</text>
  <text x="235" y="339" text-anchor="middle" fill="#8b949e" font-size="10">Auth: NONE  •  CORS: *</text>
  <text x="235" y="354" text-anchor="middle" fill="#8b949e" font-size="10">payload format v2.0</text>

  <rect x="370" y="290" width="250" height="84" rx="6" fill="#1a3a5c" stroke="#1a6aac" stroke-width="1.5"/>
  <text x="495" y="312" text-anchor="middle" fill="#e6edf3" font-weight="600">Lambda: hf-propagation</text>
  <text x="495" y="329" text-anchor="middle" fill="#8b949e" font-size="10">Python 3.12  •  x86_64  •  512 MB  •  30s</text>
  <text x="495" y="346" text-anchor="middle" fill="#8b949e" font-size="10">Flask + custom WSGI adapter</text>
  <text x="495" y="362" text-anchor="middle" fill="#8b949e" font-size="10">app.py  •  propagation.py</text>

  <rect x="650" y="300" width="180" height="74" rx="6" fill="#2a1a0d" stroke="#bb8009" stroke-width="1.5"/>
  <text x="740" y="322" text-anchor="middle" fill="#e6edf3" font-weight="600">IAM Execution Role</text>
  <text x="740" y="339" text-anchor="middle" fill="#8b949e" font-size="10">AWSLambdaBasicExecution</text>
  <text x="740" y="354" text-anchor="middle" fill="#8b949e" font-size="10">hf-dynamodb-access</text>
  <text x="740" y="369" text-anchor="middle" fill="#8b949e" font-size="10">hf-ses-send</text>

  <!-- Row 4: Data -->
  <rect x="30" y="430" width="82" height="74" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="71" y="455" text-anchor="middle" fill="#8b949e" font-size="9" font-weight="600">Resource</text>
  <text x="71" y="468" text-anchor="middle" fill="#8b949e" font-size="9" font-weight="600">Group</text>
  <text x="71" y="484" text-anchor="middle" fill="#7c3aed" font-size="9">hf_propagation</text>
  <text x="71" y="497" text-anchor="middle" fill="#8b949e" font-size="9">tag: app=</text>
  <text x="71" y="509" text-anchor="middle" fill="#8b949e" font-size="9">hf_propagation</text>

  <rect x="130" y="430" width="210" height="74" rx="6" fill="#2d1a4a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="235" y="452" text-anchor="middle" fill="#e6edf3" font-weight="600">DynamoDB: hf_solar</text>
  <text x="235" y="469" text-anchor="middle" fill="#8b949e" font-size="10">PK: record_id (String)</text>
  <text x="235" y="484" text-anchor="middle" fill="#8b949e" font-size="10">"current" row + history rows</text>
  <text x="235" y="499" text-anchor="middle" fill="#8b949e" font-size="10">on-demand  •  max 100 rows</text>

  <rect x="370" y="430" width="210" height="74" rx="6" fill="#2d1a4a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="475" y="452" text-anchor="middle" fill="#e6edf3" font-weight="600">DynamoDB: hf_users</text>
  <text x="475" y="469" text-anchor="middle" fill="#8b949e" font-size="10">PK: callsign (String)</text>
  <text x="475" y="484" text-anchor="middle" fill="#8b949e" font-size="10">visit tracking per callsign</text>
  <text x="475" y="499" text-anchor="middle" fill="#8b949e" font-size="10">on-demand  •  anon skipped</text>

  <rect x="610" y="430" width="220" height="74" rx="6" fill="#3a1a2a" stroke="#c084fc" stroke-width="1.5"/>
  <text x="720" y="452" text-anchor="middle" fill="#e6edf3" font-weight="600">SES: ggcloud.us</text>
  <text x="720" y="469" text-anchor="middle" fill="#8b949e" font-size="10">Domain identity + DKIM</text>
  <text x="720" y="484" text-anchor="middle" fill="#8b949e" font-size="10">auth token emails</text>
  <text x="720" y="499" text-anchor="middle" fill="#8b949e" font-size="10">SES_SENDER_EMAIL env var</text>

