  <text x="318" y="414" fill="#7c3aed" font-size="9">GetItem / PutItem</text>
  <text x="318" y="424" fill="#7c3aed" font-size="9">Scan / BatchWrite</text>
  <line x1="490" y1="374" x2="475" y2="428" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ap)"/>
  <text x="493" y="406" fill="#7c3aed" font-size="9">UpdateItem</text>
  <line x1="580" y1="350" x2="690" y2="430" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ap)"/>
  <text x="636" y="398" fill="#c084fc" font-size="9">SendEmail</text>
  <line x1="600" y1="310" x2="700" y2="121" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ag)"/>
  <text x="668" y="224" fill="#3fb950" font-size="9">solar fetch</text>
  <text x="668" y="236" fill="#3fb950" font-size="9">(on miss)</text>

  <text x="430" y="575" text-anchor="middle" fill="#8b949e" font-size="11">HF Propagation Map — AWS Architecture  •  tag: app=hf_propagation</text>
