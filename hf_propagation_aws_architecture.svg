<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 860 600" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="12">
  <rect width="860" height="600" fill="#0d1117" rx="10"/>

  <!-- Legend -->
